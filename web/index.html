<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Strava Route Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
        mono: ['JetBrains Mono', 'Courier New', 'monospace'],
      },
      colors: {
        strava: '#fc4c02',
        cream: '#f6f2ed',
        stone: '#1a1614',
      },
    },
  },
};
</script>
</head>
<body class="h-full bg-cream text-stone font-sans antialiased">

<!-- Full-viewport map for results -->
<div id="map-results" class="fixed inset-0 hidden z-0"></div>

<!-- Form mode -->
<div id="form-mode" class="min-h-full overflow-y-auto">
  <div class="w-full max-w-[640px] mx-auto px-4 py-8 space-y-4">

    <!-- Header -->
    <div>
      <h1 class="text-lg font-bold tracking-tight">Strava Route Explorer</h1>
      <p class="text-xs text-[#a89f97] mt-0.5">Find suggested routes from Strava</p>
    </div>

    <!-- Auth -->
    <div class="bg-white rounded-lg shadow-sm border border-[#d8d2ca] p-4">
      <div id="auth-authenticated" class="flex items-center min-h-[44px]" style="display:none">
        <span class="leading-none text-xs font-semibold text-[#4daf4a]">&#10003; Authenticated</span>
        <span class="ml-2 text-[#a89f97] cursor-pointer font-normal underline text-[10px]" onclick="logout()">log out</span>
      </div>
      <div id="auth-unauthenticated" class="flex gap-2 flex-wrap items-center" style="display:flex">
        <input type="email" id="auth-email" placeholder="Strava email" autocomplete="email"
          class="flex-1 min-w-[160px] sm:min-w-[180px] px-2.5 py-1.5 text-sm font-mono border border-[#d8d2ca] rounded bg-white text-stone outline-none focus:border-strava placeholder:text-[#c4bcb4]">
        <input type="text" id="auth-otp" placeholder="OTP code" autocomplete="off"
          class="hidden flex-1 min-w-[90px] px-2.5 py-1.5 text-sm font-mono border border-[#d8d2ca] rounded bg-white text-stone outline-none focus:border-strava placeholder:text-[#c4bcb4]">
        <button class="btn-primary text-xs px-3 py-1.5" id="auth-btn" onclick="handleAuth()">Send OTP</button>
      </div>
      <div class="text-[#e41a1c] text-xs mt-1" id="auth-error"></div>
    </div>

    <!-- Location card -->
    <div class="bg-white rounded-lg shadow-sm border border-[#d8d2ca] p-4 space-y-3">
      <div class="text-xs font-bold uppercase tracking-[0.06em] text-[#a89f97]">Location</div>
      <div>
        <label class="block text-xs font-semibold text-[#6b6158] uppercase tracking-[0.04em] mb-1">Latitude <span class="text-[#e41a1c]">*</span></label>
        <div class="flex flex-nowrap gap-1.5">
          <input type="number" id="lat" step="any" placeholder="Lat"
            class="w-[70px] sm:flex-1 sm:min-w-0 px-2 py-1.5 sm:px-2.5 text-sm font-mono border border-[#d8d2ca] rounded bg-white text-stone outline-none focus:border-strava placeholder:text-[#c4bcb4]">
          <input type="number" id="lng" step="any" placeholder="Lng"
            class="w-[70px] sm:flex-1 sm:min-w-0 px-2 py-1.5 sm:px-2.5 text-sm font-mono border border-[#d8d2ca] rounded bg-white text-stone outline-none focus:border-strava placeholder:text-[#c4bcb4]">
          <button class="btn-secondary text-sm sm:text-lg px-1.5 py-1 sm:px-2.5 sm:py-1 shrink-0" onclick="detectLocation()" title="Auto-detect">&#8982;</button>
        </div>
        <div class="text-[10px] text-[#a89f97] mt-1" id="loc-status">Click the map, enter coords, or use auto-detect</div>
      </div>
      <div id="map-form" class="h-[200px] md:h-[260px] rounded-lg border border-[#d8d2ca] z-0"></div>
    </div>

    <!-- Route card -->
    <div class="bg-white rounded-lg shadow-sm border border-[#d8d2ca] p-4 space-y-3">
      <div class="text-xs font-bold uppercase tracking-[0.06em] text-[#a89f97]">Route</div>
      <div>
        <label class="block text-xs font-semibold text-[#6b6158] uppercase tracking-[0.04em] mb-1">Route Type <span class="text-[#e41a1c]">*</span></label>
        <select id="route-type" class="w-full px-2.5 py-1.5 text-sm font-mono border border-[#d8d2ca] rounded bg-white text-stone outline-none focus:border-strava">
          <option value="">-- Select --</option>
          <option value="Run">Run</option>
          <option value="TrailRun">Trail Run</option>
          <option value="Walk">Walk</option>
          <option value="Hike">Hike</option>
          <option value="Ride">Ride</option>
          <option value="MountainBikeRide">Mountain Bike</option>
          <option value="GravelRide">Gravel Ride</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold text-[#6b6158] uppercase tracking-[0.04em] mb-1">Difficulty</label>
        <select id="difficulty" class="w-full px-2.5 py-1.5 text-sm font-mono border border-[#d8d2ca] rounded bg-white text-stone outline-none focus:border-strava">
          <option value="Undefined">Any</option>
          <option value="Easy">Easy</option>
          <option value="Moderate">Moderate</option>
          <option value="Hard">Hard</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold text-[#6b6158] uppercase tracking-[0.04em] mb-1">Min Elevation (m)</label>
        <input type="number" id="elevation" placeholder="0"
          class="w-full px-2.5 py-1.5 text-sm font-mono border border-[#d8d2ca] rounded bg-white text-stone outline-none focus:border-strava placeholder:text-[#c4bcb4]">
      </div>
      <div>
        <label class="block text-xs font-semibold text-[#6b6158] uppercase tracking-[0.04em] mb-1">Target Distance (km)</label>
        <input type="number" id="distance" step="any" placeholder="-1 (no preference)"
          class="w-full px-2.5 py-1.5 text-sm font-mono border border-[#d8d2ca] rounded bg-white text-stone outline-none focus:border-strava placeholder:text-[#c4bcb4]">
      </div>
    </div>

    <!-- Bounding box card -->
    <div class="bg-white rounded-lg shadow-sm border border-[#d8d2ca] p-4 space-y-3">
      <div class="text-xs font-bold uppercase tracking-[0.06em] text-[#a89f97]">Bounding Box <span class="font-normal normal-case text-[#c4bcb4] text-[10px] tracking-normal">(optional)</span></div>
      <div class="flex items-center gap-2">
        <input type="checkbox" id="custom-bbox" class="w-auto">
        <label for="custom-bbox" class="text-sm text-[#3e3a35] font-normal">Set custom bounding box</label>
      </div>
      <div class="hidden space-y-2" id="bbox-fields">
        <div>
          <label class="block text-xs font-semibold text-[#6b6158] uppercase tracking-[0.04em] mb-1">NE Corner (lat, lng)</label>
          <div class="flex gap-1.5">
            <input type="number" id="bbox-ne-lat" step="any" placeholder="lat"
              class="w-[80px] sm:flex-1 px-2 py-1.5 sm:px-2.5 text-sm font-mono border border-[#d8d2ca] rounded bg-white text-stone outline-none focus:border-strava placeholder:text-[#c4bcb4]">
            <input type="number" id="bbox-ne-lng" step="any" placeholder="lng"
              class="w-[80px] sm:flex-1 px-2 py-1.5 sm:px-2.5 text-sm font-mono border border-[#d8d2ca] rounded bg-white text-stone outline-none focus:border-strava placeholder:text-[#c4bcb4]">
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-[#6b6158] uppercase tracking-[0.04em] mb-1">SW Corner (lat, lng)</label>
          <div class="flex gap-1.5">
            <input type="number" id="bbox-sw-lat" step="any" placeholder="lat"
              class="w-[80px] sm:flex-1 px-2 py-1.5 sm:px-2.5 text-sm font-mono border border-[#d8d2ca] rounded bg-white text-stone outline-none focus:border-strava placeholder:text-[#c4bcb4]">
            <input type="number" id="bbox-sw-lng" step="any" placeholder="lng"
              class="w-[80px] sm:flex-1 px-2 py-1.5 sm:px-2.5 text-sm font-mono border border-[#d8d2ca] rounded bg-white text-stone outline-none focus:border-strava placeholder:text-[#c4bcb4]">
          </div>
        </div>
      </div>
    </div>

    <!-- Find button -->
    <button class="btn-primary w-full justify-center py-3 text-sm font-bold" onclick="findRoutes()" id="find-btn">Find Routes</button>
    <div id="loading-bar" class="hidden items-center justify-center gap-2 py-4 text-sm text-[#6b6158]">
      <span>Loading...</span>
    </div>
  </div>
</div>

<!-- Backdrop for mobile panel -->
<div id="panel-backdrop" class="fixed inset-0 bg-black/30 z-20 hidden" onclick="closePanel()"></div>

<!-- Results panel -->
<div id="results-panel" class="fixed top-0 right-0 bottom-0 z-30 bg-cream shadow-lg transition-transform duration-300
  w-full sm:w-[380px] md:w-[340px]
  translate-x-full hidden
  md:border-l border-[#d8d2ca]">
  <div class="flex items-center gap-2 px-4 py-2.5 border-b border-[#e4dfd8] shrink-0">
    <button class="btn-secondary text-xs px-2.5 py-1" onclick="showFormView()">&#8592; New Search</button>
    <button class="btn-secondary text-xs px-2.5 py-1" onclick="fitAllRoutes()">All routes</button>
    <button class="md:hidden ml-auto btn-secondary text-xs px-2 py-1" onclick="closePanel()">&#10005;</button>
  </div>
  <div class="text-[10px] font-bold uppercase tracking-[0.14em] text-[#a89f97] px-4 pt-2 pb-1 font-mono" id="results-header"></div>
  <ul id="route-list" class="flex-1 overflow-y-auto list-none"></ul>
</div>

<!-- Floating action button (mobile only) -->
<button id="panel-fab" class="fixed bottom-5 right-5 z-20 w-12 h-12 rounded-full bg-strava text-white shadow-lg items-center justify-center text-xl hidden md:hidden" onclick="togglePanel()">&#9776;</button>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="close-btn" onclick="event.stopPropagation();closeLightbox()">&times;</button>
  <img src="" alt="Route image">
</div>

<!-- Toast -->
<div id="toast"></div>

<style>
.btn-primary, .btn-secondary { display: inline-flex; align-items: center; gap: 0.25rem; font-family: 'Inter', sans-serif; font-weight: 600; border: none; border-radius: 0.375rem; cursor: pointer; transition: background .15s; white-space: nowrap; }
.btn-primary { background: #fc4c02; color: #fff; }
.btn-primary:hover { background: #e04402; }
.btn-primary:disabled { opacity: .5; cursor: default; }
.btn-primary:disabled:hover { background: #fc4c02; }
.btn-secondary { background: #ddd8d0; color: #3e3a35; }
.btn-secondary:hover { background: #cec8be; }
</style>

<script src="app.js"></script>
</body>
</html>
